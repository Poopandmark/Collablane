<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | CollabLane</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}
body{
  background:#050505;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
  padding:24px;
}
.bg-glow{
  position:absolute;
  width:min(72vw, 700px);
  height:min(72vw, 700px);
  background:radial-gradient(circle, rgba(255,0,0,0.24), transparent 70%);
  filter:blur(100px);
}
.box{
  position:relative;
  z-index:2;
  width:min(92vw, 640px);
  padding:48px 28px;
  border-radius:24px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(255,0,0,0.08);
}
.badge{
  width:72px;
  height:72px;
  margin:0 auto 22px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:30px;
  background:rgba(255,0,0,0.12);
  border:1px solid rgba(255,255,255,0.08);
}
h1{
  font-size:clamp(32px, 5vw, 48px);
  margin-bottom:12px;
  line-height:1.1;
}
h1 span{
  color:#ff1a1a;
}
p{
  color:#aaa;
  margin:0 auto 28px;
  max-width:520px;
  line-height:1.75;
  font-size:clamp(15px, 2vw, 17px);
}
.btn-row{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}
.btn{
  padding:12px 28px;
  background:#ff1a1a;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
  transition:.25s;
  font-weight:600;
  text-decoration:none;
  display:inline-block;
}
.btn:hover{
  background:#ff3333;
  transform:translateY(-2px);
}
.btn.secondary{
  background:transparent;
  border:1px solid rgba(255,255,255,0.14);
}
.btn.secondary:hover{
  border-color:#ff1a1a;
  color:#ff1a1a;
  background:rgba(255,255,255,0.02);
}
.note{
  margin-top:18px;
  font-size:13px;
  color:#7f7f7f;
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="box">
  <div class="badge">✓</div>
  <h1>Thank You <span>for Contacting Us</span></h1>
  <p>Your request has been sent successfully. We’ve received your details and will get back to you soon.</p>

  <div class="btn-row">
    <a class="btn" href="index.html">Back to Home</a>
    <a class="btn secondary" href="javascript:history.back()">Go Back</a>
  </div>

</div>
</body>
</html>
